<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="880" height="520" fill="#f5f5f5" rx="12"/>

  <!-- Title -->
  <text x="440" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a237e">Öffentliche Dokumente &amp; Pakete</text>

  <!-- Left: Internal ELIZA -->
  <rect x="30" y="60" width="340" height="440" fill="white" rx="8" stroke="#e0e0e0" stroke-width="1.5"/>
  <rect x="30" y="60" width="340" height="40" fill="#1a237e" rx="8"/>
  <rect x="30" y="88" width="340" height="12" fill="#1a237e"/>
  <text x="200" y="86" text-anchor="middle" font-size="14" font-weight="bold" fill="white">ELIZA DMS (intern)</text>

  <!-- Document workflow -->
  <rect x="55" y="115" width="120" height="36" fill="#e3f2fd" rx="6" stroke="#1565c0" stroke-width="1"/>
  <text x="115" y="138" text-anchor="middle" font-size="11" fill="#1565c0">Entwurf</text>

  <line x1="175" y1="133" x2="205" y2="133" stroke="#90a4ae" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="205" y="115" width="120" height="36" fill="#e8f5e9" rx="6" stroke="#2e7d32" stroke-width="1"/>
  <text x="265" y="138" text-anchor="middle" font-size="11" fill="#2e7d32">Freigegeben</text>

  <line x1="265" y1="151" x2="265" y2="180" stroke="#90a4ae" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="205" y="180" width="120" height="36" fill="#fff3e0" rx="6" stroke="#e65100" stroke-width="2"/>
  <text x="265" y="203" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">Öffentlich</text>

  <!-- Publish arrow label -->
  <text x="290" y="172" font-size="9" fill="#e65100">Publizieren</text>

  <!-- Single document sharing -->
  <rect x="50" y="240" width="140" height="80" fill="#fff8e1" rx="6" stroke="#f9a825" stroke-width="1"/>
  <text x="120" y="262" text-anchor="middle" font-size="10" font-weight="bold" fill="#f57f17">Einzelnes Dokument</text>
  <text x="120" y="278" text-anchor="middle" font-size="9" fill="#666">Public Link</text>
  <text x="120" y="292" text-anchor="middle" font-size="9" fill="#666">QR-Code</text>
  <rect x="80" y="300" width="80" height="14" fill="#f9a825" rx="3"/>
  <text x="120" y="310" text-anchor="middle" font-size="8" fill="white">Link kopieren</text>

  <!-- Bundle -->
  <rect x="210" y="240" width="140" height="80" fill="#e8eaf6" rx="6" stroke="#3f51b5" stroke-width="1"/>
  <text x="280" y="262" text-anchor="middle" font-size="10" font-weight="bold" fill="#283593">Dokument-Paket</text>
  <text x="280" y="278" text-anchor="middle" font-size="9" fill="#666">Mehrere Dokumente</text>
  <text x="280" y="292" text-anchor="middle" font-size="9" fill="#666">Ablaufdatum optional</text>
  <rect x="240" y="300" width="80" height="14" fill="#3f51b5" rx="3"/>
  <text x="280" y="310" text-anchor="middle" font-size="8" fill="white">Paket teilen</text>

  <!-- Permission badge -->
  <rect x="55" y="345" width="295" height="50" fill="#fce4ec" rx="6" stroke="#c62828" stroke-width="1"/>
  <text x="70" y="365" font-size="10" fill="#c62828" font-weight="bold">Berechtigung erforderlich:</text>
  <text x="70" y="383" font-size="10" fill="#c62828">Gruppe: DMS Dokumente (Veröffentlichen)</text>

  <!-- Feature toggle -->
  <rect x="55" y="410" width="295" height="40" fill="#e0f2f1" rx="6" stroke="#00695c" stroke-width="1"/>
  <text x="70" y="430" font-size="10" fill="#00695c" font-weight="bold">Feature-Toggle:</text>
  <text x="70" y="445" font-size="9" fill="#00695c">DMS_PUBLIC_DOCUMENTS_ENABLED = True</text>

  <!-- Right: External access -->
  <rect x="500" y="60" width="350" height="440" fill="white" rx="8" stroke="#e0e0e0" stroke-width="1.5"/>
  <rect x="500" y="60" width="350" height="40" fill="#00695c" rx="8"/>
  <rect x="500" y="88" width="350" height="12" fill="#00695c"/>
  <text x="675" y="86" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Externer Zugriff (ohne Login)</text>

  <!-- Browser mockup -->
  <rect x="525" y="115" width="300" height="185" fill="#fafafa" rx="6" stroke="#bdbdbd" stroke-width="1"/>
  <rect x="525" y="115" width="300" height="24" fill="#eeeeee" rx="6"/>
  <rect x="525" y="133" width="300" height="6" fill="#eeeeee"/>
  <circle cx="540" cy="127" r="4" fill="#ef5350"/>
  <circle cx="553" cy="127" r="4" fill="#ffc107"/>
  <circle cx="566" cy="127" r="4" fill="#4caf50"/>
  <rect x="580" y="122" width="200" height="12" fill="white" rx="3" stroke="#bdbdbd" stroke-width="0.5"/>
  <text x="680" y="131" text-anchor="middle" font-size="7" fill="#666">dms/public/a1b2c3...</text>

  <!-- Document preview in browser -->
  <rect x="540" y="150" width="270" height="28" fill="#e8f5e9" rx="4"/>
  <text x="580" y="168" font-size="10" fill="#2e7d32">whitepaper.pdf</text>

  <!-- Metadata -->
  <text x="540" y="198" font-size="9" fill="#666">Freigabedatum: 16.04.2026</text>
  <text x="540" y="213" font-size="9" fill="#666">Revision: 3</text>

  <!-- Download button -->
  <rect x="540" y="224" width="160" height="28" fill="#4caf50" rx="4"/>
  <text x="620" y="243" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Dokument herunterladen</text>

  <!-- PDF viewer area -->
  <rect x="540" y="260" width="270" height="28" fill="#f5f5f5" rx="3" stroke="#e0e0e0" stroke-width="0.5"/>
  <text x="675" y="278" text-anchor="middle" font-size="9" fill="#999">PDF-Vorschau im Browser</text>

  <!-- QR Code illustration -->
  <rect x="525" y="320" width="120" height="120" fill="white" rx="6" stroke="#bdbdbd" stroke-width="1"/>
  <text x="585" y="342" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">QR-Code</text>
  <!-- QR pattern -->
  <rect x="545" y="350" width="80" height="80" fill="white" stroke="#333" stroke-width="1"/>
  <rect x="549" y="354" width="16" height="16" fill="#333"/>
  <rect x="569" y="354" width="8" height="8" fill="#333"/>
  <rect x="581" y="354" width="8" height="8" fill="#333"/>
  <rect x="605" y="354" width="16" height="16" fill="#333"/>
  <rect x="549" y="374" width="8" height="8" fill="#333"/>
  <rect x="565" y="374" width="8" height="8" fill="#333"/>
  <rect x="585" y="374" width="8" height="8" fill="#333"/>
  <rect x="605" y="374" width="8" height="8" fill="#333"/>
  <rect x="549" y="390" width="16" height="8" fill="#333"/>
  <rect x="573" y="390" width="16" height="8" fill="#333"/>
  <rect x="597" y="390" width="8" height="8" fill="#333"/>
  <rect x="549" y="406" width="16" height="16" fill="#333"/>
  <rect x="573" y="406" width="8" height="8" fill="#333"/>
  <rect x="589" y="406" width="8" height="8" fill="#333"/>
  <rect x="605" y="406" width="16" height="16" fill="#333"/>

  <!-- Bundle illustration -->
  <rect x="665" y="320" width="160" height="120" fill="#e8eaf6" rx="6" stroke="#3f51b5" stroke-width="1"/>
  <text x="745" y="342" text-anchor="middle" font-size="10" font-weight="bold" fill="#283593">Paket-Ansicht</text>
  <!-- Stacked docs -->
  <rect x="685" y="355" width="120" height="18" fill="white" rx="3" stroke="#bdbdbd" stroke-width="0.5"/>
  <text x="700" y="368" font-size="8" fill="#333">Richtlinie_v2.pdf</text>
  <rect x="685" y="377" width="120" height="18" fill="white" rx="3" stroke="#bdbdbd" stroke-width="0.5"/>
  <text x="700" y="390" font-size="8" fill="#333">Handbuch_QM.docx</text>
  <rect x="685" y="399" width="120" height="18" fill="white" rx="3" stroke="#bdbdbd" stroke-width="0.5"/>
  <text x="700" y="412" font-size="8" fill="#333">Zertifikat_ISO.pdf</text>
  <text x="745" y="434" text-anchor="middle" font-size="8" fill="#666">3 Dokumente</text>

  <!-- Connecting arrows -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#90a4ae"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#00695c"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#3f51b5"/>
    </marker>
  </defs>

  <!-- Arrow: Single doc to browser (goes above the boxes) -->
  <path d="M120 240 L120 228 L460 228 L460 200 L525 200" fill="none" stroke="#00695c" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-green)"/>
  <rect x="250" y="215" width="80" height="16" fill="#f5f5f5" rx="3"/>
  <text x="290" y="227" text-anchor="middle" font-size="9" fill="#00695c" font-weight="bold">Public Link</text>

  <!-- Arrow: Bundle to bundle view (goes below the boxes) -->
  <path d="M280 320 L280 340 L460 340 L460 380 L525 380" fill="none" stroke="#3f51b5" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-blue)"/>
  <rect x="335" y="327" width="80" height="16" fill="#f5f5f5" rx="3"/>
  <text x="375" y="339" text-anchor="middle" font-size="9" fill="#3f51b5" font-weight="bold">Bundle Link</text>

  <!-- Audit log note -->
  <rect x="525" y="455" width="310" height="22" fill="#fff3e0" rx="3"/>
  <text x="680" y="470" text-anchor="middle" font-size="9" fill="#e65100">Alle Zugriffe werden im Audit-Log protokolliert</text>
</svg>
